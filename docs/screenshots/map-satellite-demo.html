<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yarbo Location Map - Satellite Example</title>
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    >
    <style>
        :root {
            --bg: #0f1419;
            --surface: #1a2332;
            --border: #2d3a4f;
            --text: #e8edf4;
            --muted: #8b9cb3;
            --accent: #3d9a5f;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
        }
        .container {
            width: 900px;
            margin: 24px auto;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        h2 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .layers {
            font-size: 13px;
            color: var(--muted);
        }
        .hint {
            margin: 0 0 12px;
            color: var(--muted);
            font-size: 14px;
        }
        #map {
            height: 460px;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .status {
            margin-top: 10px;
            color: var(--muted);
            font-size: 14px;
        }
        .pill {
            display: inline-block;
            margin-left: 6px;
            padding: 2px 10px;
            border-radius: 999px;
            background: rgba(61, 154, 95, 0.25);
            border: 1px solid rgba(125, 222, 160, 0.45);
            color: #7ddea0;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <main class="container">
        <section class="card">
            <div class="header">
                <h2>Location Map</h2>
                <div class="layers">Street / <strong>Satellite</strong></div>
            </div>
            <p class="hint">Live GPS from RTK telemetry. Example satellite view with heading overlay (fictional coordinates).</p>
            <div id="map"></div>
            <p class="status">
                GPS locked (fix_quality=1) at 51.500000, -0.120000 | altitude 42.0m (example)
                <span class="pill">Live fix</span>
            </p>
        </section>
    </main>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script>
        const lat = 51.500000;
        const lon = -0.120000;
        const map = L.map('map', { zoomControl: false }).setView([lat, lon], 17);
        L.tileLayer(
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
            { maxZoom: 22, attribution: 'Tiles © Esri' }
        ).addTo(map);

        const heading = 332;
        const headingRad = (heading * Math.PI) / 180;
        const meters = 4;
        const dLat = (meters * Math.cos(headingRad)) / 111320;
        const dLon = (meters * Math.sin(headingRad)) / (111320 * Math.cos((lat * Math.PI) / 180));
        const tip = [lat + dLat, lon + dLon];

        L.circleMarker([lat, lon], {
            radius: 8,
            color: '#7ddea0',
            weight: 2,
            fillColor: '#3d9a5f',
            fillOpacity: 0.95
        }).addTo(map);

        L.polyline([[lat, lon], tip], {
            color: '#7ddea0',
            weight: 3,
            opacity: 0.95
        }).addTo(map);

        L.polygon([
            [51.5012, -0.1212],
            [51.5012, -0.1188],
            [51.4988, -0.1188],
            [51.4988, -0.1212],
        ], {
            color: '#7ddea0',
            weight: 2,
            fillColor: '#3d9a5f',
            fillOpacity: 0.18,
        }).addTo(map);
    </script>
</body>
</html>
